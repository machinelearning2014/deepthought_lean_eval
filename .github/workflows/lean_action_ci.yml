name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Build all submissions
        shell: bash
        run: |
          for dir in submissions/*/; do
            echo "::group::Building $dir"
            cd "$dir"
            lake build
            cd "$OLDPWD"
            echo "::endgroup::"
          done
